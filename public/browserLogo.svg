<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Google Fonts JetBrains Mono Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;900&amp;display=swap');
      .mono-text {
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
    
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e15" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>
    
    <!-- Accent Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Glow Filter for text/cursor -->
    <filter id="text-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="16" y="16" width="480" height="480" rx="56" fill="url(#bg-grad)" stroke="#1a1a24" stroke-width="4" />
  
  <!-- Outer Emerald Glow Ring -->
  <rect x="24" y="24" width="464" height="464" rx="48" fill="none" stroke="#10b981" stroke-width="2" opacity="0.35" filter="url(#glow)" />
  
  <!-- Terminal Window Header Controls -->
  <g transform="translate(56, 56)">
    <!-- Red dot (close) -->
    <circle cx="0" cy="0" r="10" fill="#ef4444" opacity="0.9" />
    <!-- Yellow dot (minimize) -->
    <circle cx="28" cy="0" r="10" fill="#f59e0b" opacity="0.9" />
    <!-- Green dot (maximize) -->
    <circle cx="56" cy="0" r="10" fill="#10b981" opacity="0.9" />
  </g>
  
  <!-- Sleek Code/Grid Background Pattern -->
  <g opacity="0.04" stroke="#e5e7eb" stroke-width="1.5">
    <path d="M 16,112 L 496,112 M 16,160 L 496,160 M 16,208 L 496,208 M 16,256 L 496,256 M 16,304 L 496,304 M 16,352 L 496,352 M 16,400 L 496,400 M 16,448 L 496,448" />
    <path d="M 96,112 L 96,480 M 144,112 L 144,480 M 192,112 L 192,480 M 240,112 L 240,480 M 288,112 L 288,480 M 336,112 L 336,480 M 384,112 L 384,480 M 432,112 L 432,480" />
  </g>
  
  <!-- Stylized Background Tag / Code Symbols (Brackets) -->
  <path d="M 180,180 L 110,256 L 180,332" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.07" />
  <path d="M 332,180 L 402,256 L 332,332" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.07" />

  <!-- Central Logo Content -->
  <g transform="translate(256, 276)">
    <!-- Console prompt symbol > -->
    <text class="mono-text" x="-190" y="0" font-size="52" font-weight="900" fill="#10b981" filter="url(#text-glow)">&gt;</text>
    
    <!-- Code Text: tolgaosman_ -->
    <text class="mono-text" x="-145" y="0" font-size="46" font-weight="700" letter-spacing="-1">
      <tspan fill="#e5e7eb">tolga</tspan>
      <tspan fill="#10b981">osman</tspan>
      <tspan fill="#34d399" filter="url(#text-glow)">_</tspan>
    </text>
    
    <!-- Subtitle/Role: SOFTWARE ENGINEER -->
    <text class="mono-text" x="-145" y="55" font-size="16" font-weight="500" fill="#9ca3af" letter-spacing="4">
      SOFTWARE ENGINEER
    </text>
  </g>
  
  <!-- Inner Border outlining the terminal terminal screen -->
  <rect x="36" y="112" width="440" height="344" rx="24" fill="none" stroke="#10b981" stroke-width="2" opacity="0.15" />
</svg>
